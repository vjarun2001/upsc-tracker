{% extends "auth_base.html" %}

{% block title %}
Log Out
{% endblock %}

{% block content %}

<h3 class="fw-bold mb-3 text-center">Log out?</h3>

<p class="text-muted mb-4 text-center">Are you sure you want to log out?</p>

<form method="post" action="{% url 'account_logout' %}">

    {% csrf_token %}

    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
        Log Out
    </button>

</form>

{% endblock %}

{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}
Edit Note
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow-sm">

            <div class="card-header"><strong>Edit Note</strong></div>

            <div class="card-body">

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button class="btn btn-primary w-100">Save Changes</button>
                    <a class="btn btn-outline-secondary w-100 mt-2" href="{% url 'notes:list' %}">Cancel</a>
                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
